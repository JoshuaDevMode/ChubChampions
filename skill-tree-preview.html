<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Chub Champions - Skill Tree Preview</title>
  <style>
    :root {
      --ink: #2b1a0d;
      --brown: #5c3514;
      --line: rgba(94, 54, 20, 0.38);
      --paper: #f7e7be;
      --paper-deep: #d7b16e;
      --gold: #f4b83c;
      --attack: #b91c1c;
      --defense: #176b99;
      --alchemist: #12836f;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      overflow: hidden;
      color: var(--ink);
      font-family: "Trebuchet MS", "Arial Rounded MT Bold", Arial, sans-serif;
      background:
        radial-gradient(circle at 16% 12%, rgba(255, 229, 128, 0.38), transparent 28%),
        radial-gradient(circle at 82% 20%, rgba(95, 156, 204, 0.28), transparent 30%),
        linear-gradient(180deg, #57b9e9 0%, #9bd77c 49%, #4d8a4d 100%);
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background-image: url("Assets/UI/lobby-bg-kawaii.png");
      background-size: cover;
      background-position: center;
      opacity: 0.28;
      filter: saturate(1.08);
      pointer-events: none;
    }

    .screen {
      position: relative;
      z-index: 1;
      width: min(1780px, calc(100vw - 38px));
      height: min(940px, calc(100vh - 34px));
      margin: 17px auto;
      display: grid;
      grid-template-rows: auto auto minmax(0, 1fr) auto;
      gap: 12px;
      padding: 26px 30px 24px;
      background: none;
      border: 34px solid transparent;
      border-image-source: url("Assets/UI/window-frame.png");
      border-image-slice: 15% fill;
      border-image-width: 34px;
      border-image-repeat: stretch;
      filter: drop-shadow(0 16px 24px rgba(35, 18, 7, 0.36));
    }

    .screen::after {
      content: "";
      position: absolute;
      inset: 28px;
      border-radius: 8px;
      background:
        linear-gradient(90deg, rgba(103, 65, 24, 0.08) 1px, transparent 1px),
        linear-gradient(180deg, rgba(103, 65, 24, 0.06) 1px, transparent 1px);
      background-size: 54px 54px;
      opacity: 0.45;
      pointer-events: none;
      mask-image: linear-gradient(180deg, transparent, #000 12%, #000 88%, transparent);
    }

    .topbar {
      position: relative;
      z-index: 2;
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto auto;
      align-items: center;
      gap: 14px;
      padding: 4px 2px 8px;
    }

    .title {
      display: flex;
      align-items: baseline;
      gap: 12px;
      min-width: 0;
      color: #3a220d;
      text-transform: uppercase;
      text-shadow: 0 2px 0 rgba(255, 246, 210, 0.85);
    }

    .title h1 {
      margin: 0;
      font-size: clamp(30px, 3.2vw, 52px);
      line-height: 0.9;
      letter-spacing: 0;
      font-weight: 950;
    }

    .title span {
      color: #724314;
      font-size: 14px;
      font-weight: 900;
      white-space: nowrap;
    }

    .bp-chip,
    .close-chip {
      min-height: 46px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0 18px;
      border: 3px solid #57300e;
      border-radius: 999px;
      background: linear-gradient(180deg, #ffd862, #db8b18);
      box-shadow: inset 0 2px 0 rgba(255,255,255,0.55), 0 4px 0 rgba(70,35,8,0.34);
      color: #3a210c;
      font-size: 18px;
      font-weight: 950;
      text-transform: uppercase;
      white-space: nowrap;
    }

    .close-chip {
      width: 48px;
      padding: 0;
      cursor: default;
    }

    .tabs {
      position: relative;
      z-index: 2;
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
      padding: 0 2px 4px;
    }

    .tab {
      min-height: 56px;
      border: 3px solid rgba(73, 41, 14, 0.66);
      border-radius: 8px;
      background: linear-gradient(180deg, rgba(255, 241, 198, 0.96), rgba(217, 178, 103, 0.94));
      color: #40240c;
      font-size: clamp(15px, 1.25vw, 22px);
      font-weight: 950;
      text-transform: uppercase;
      box-shadow: inset 0 2px 0 rgba(255,255,255,0.52), 0 4px 0 rgba(72, 39, 14, 0.22);
      cursor: pointer;
      transition: transform 140ms ease, filter 140ms ease, box-shadow 140ms ease;
    }

    .tab.attack { border-bottom-color: var(--attack); }
    .tab.defense { border-bottom-color: var(--defense); }
    .tab.alchemist { border-bottom-color: var(--alchemist); }
    .tab.active {
      transform: translateY(2px);
      filter: saturate(1.1) brightness(1.03);
      box-shadow: inset 0 2px 0 rgba(255,255,255,0.6), 0 2px 0 rgba(72, 39, 14, 0.28);
    }
    .tab.attack.active { background: linear-gradient(180deg, #ffe2a3, #e7a23d 70%, #b75a1d); color: #401409; }
    .tab.defense.active { background: linear-gradient(180deg, #dff5ff, #86c5db 70%, #397d9e); color: #102f42; }
    .tab.alchemist.active { background: linear-gradient(180deg, #d9fff2, #83cdb2 70%, #288a72); color: #0c342b; }

    .tree-grid {
      position: relative;
      z-index: 2;
      min-height: 0;
      display: block;
    }

    .tree-panel {
      position: relative;
      width: 100%;
      height: 100%;
      min-height: 0;
      overflow: hidden;
      border: 3px solid rgba(92, 54, 20, 0.42);
      border-radius: 8px;
      background:
        radial-gradient(circle at 50% 24%, rgba(255, 255, 255, 0.58), transparent 30%),
        linear-gradient(180deg, rgba(255, 247, 220, 0.82), rgba(221, 186, 116, 0.58));
      box-shadow: inset 0 0 0 2px rgba(255,255,255,0.35), inset 0 -18px 36px rgba(108, 62, 20, 0.13);
    }

    .tree-panel.attack { --tree-color: var(--attack); }
    .tree-panel.defense { --tree-color: var(--defense); }
    .tree-panel.alchemist { --tree-color: var(--alchemist); }

    .tree-head {
      position: absolute;
      z-index: 5;
      top: 16px;
      left: 18px;
      right: 18px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      pointer-events: none;
    }

    .tree-name {
      padding: 7px 12px;
      border: 2px solid rgba(72, 39, 14, 0.48);
      border-radius: 999px;
      background: rgba(255, 245, 218, 0.78);
      color: var(--tree-color);
      font-size: clamp(18px, 1.35vw, 25px);
      font-weight: 950;
      text-transform: uppercase;
      box-shadow: 0 2px 0 rgba(64, 34, 10, 0.15);
    }

    .tree-count {
      color: #6d4723;
      font-size: clamp(13px, 0.95vw, 17px);
      font-weight: 950;
      text-transform: uppercase;
    }

    .tree-canvas {
      position: absolute;
      inset: 48px 28px 26px;
    }

    .links {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: 1;
      pointer-events: none;
    }

    .links path {
      fill: none;
      stroke: rgba(83, 48, 17, 0.43);
      stroke-width: 6;
      stroke-linecap: round;
      stroke-linejoin: round;
      filter: drop-shadow(0 2px 0 rgba(255,255,255,0.55));
    }

    .links path.active {
      stroke: color-mix(in srgb, var(--tree-color), #f7d267 36%);
      stroke-width: 7;
      filter: drop-shadow(0 0 4px rgba(255, 222, 95, 0.55));
    }

    .node {
      position: absolute;
      z-index: 3;
      width: clamp(86px, 7.1vw, 122px);
      aspect-ratio: 1;
      transform: translate(-50%, -50%);
      border: 0;
      padding: 0;
      background: transparent;
      cursor: pointer;
      filter: drop-shadow(0 6px 5px rgba(46, 24, 8, 0.32));
    }

    .node::before {
      content: "";
      position: absolute;
      inset: -8px;
      border-radius: 50%;
      background: radial-gradient(circle, color-mix(in srgb, var(--tree-color), #fff 25%), transparent 68%);
      opacity: 0;
      transform: scale(0.82);
      transition: opacity 160ms ease, transform 160ms ease;
    }

    .node.available::before {
      opacity: 0.34;
      animation: pulse 1.55s ease-in-out infinite;
    }

    .node.selected::before {
      opacity: 0.62;
      transform: scale(1);
    }

    .icon {
      position: absolute;
      inset: 0;
      background-repeat: no-repeat;
      background-size: calc(var(--cols) * 100%) calc(var(--rows) * 100%);
      background-position: var(--pos-x) var(--pos-y);
      transform: scale(1.18);
    }

    .node.locked .icon {
      filter: grayscale(0.85) brightness(0.58);
      opacity: 0.78;
    }

    .node.blocked .icon {
      filter: grayscale(0.5) saturate(0.5) brightness(0.65);
      opacity: 0.72;
    }

    .node.maxed .icon {
      filter: saturate(1.2) brightness(1.08);
    }

    .rank {
      position: absolute;
      left: 50%;
      bottom: -10px;
      transform: translateX(-50%);
      display: flex;
      gap: 3px;
      padding: 3px 5px;
      border: 1px solid rgba(73, 41, 14, 0.42);
      border-radius: 999px;
      background: rgba(255, 244, 211, 0.86);
    }

    .pip {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: rgba(66, 39, 16, 0.22);
    }

    .pip.on { background: #f5b82f; box-shadow: 0 0 4px rgba(245, 184, 47, 0.8); }

    .lock,
    .block-x {
      position: absolute;
      right: -4px;
      top: -4px;
      width: 25px;
      height: 25px;
      display: grid;
      place-items: center;
      border: 2px solid #58320f;
      border-radius: 50%;
      background: #ead4a1;
      color: #4b2a0d;
      font-size: 14px;
      font-weight: 950;
    }

    .block-x {
      background: #8b1f1f;
      color: #ffe6c7;
    }

    .label {
      position: absolute;
      left: 50%;
      top: calc(100% + 13px);
      transform: translateX(-50%);
      width: 142px;
      color: #41260e;
      font-size: clamp(11px, 0.78vw, 14px);
      font-weight: 950;
      line-height: 1.05;
      text-align: center;
      text-transform: uppercase;
      text-shadow: 0 1px 0 rgba(255, 244, 213, 0.92);
      pointer-events: none;
    }

    .detail {
      position: relative;
      z-index: 2;
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      align-items: center;
      gap: 16px;
      min-height: 128px;
      padding: 12px 16px;
      border: 3px solid rgba(87, 48, 14, 0.52);
      border-radius: 8px;
      background:
        linear-gradient(180deg, rgba(255, 248, 224, 0.88), rgba(224, 188, 116, 0.82));
      box-shadow: inset 0 2px 0 rgba(255,255,255,0.55), 0 -2px 0 rgba(72, 39, 14, 0.13);
    }

    .detail-main {
      display: grid;
      grid-template-columns: 104px minmax(0, 1fr) minmax(210px, 0.42fr);
      align-items: center;
      gap: 14px;
      min-width: 0;
    }

    .detail-icon {
      position: relative;
      width: 96px;
      aspect-ratio: 1;
      background-repeat: no-repeat;
      background-size: calc(var(--cols) * 100%) calc(var(--rows) * 100%);
      background-position: var(--pos-x) var(--pos-y);
      transform: scale(1.12);
      filter: drop-shadow(0 8px 7px rgba(51, 25, 8, 0.32));
    }

    .detail h2 {
      margin: 0 0 4px;
      color: #3b220c;
      font-size: clamp(22px, 2vw, 31px);
      line-height: 1;
      font-weight: 950;
      text-transform: uppercase;
    }

    .detail p {
      margin: 0;
      color: #624018;
      font-size: clamp(13px, 1.05vw, 17px);
      font-weight: 850;
      line-height: 1.25;
    }

    .detail-stat {
      display: grid;
      gap: 6px;
      min-width: 0;
      padding-left: 14px;
      border-left: 2px solid rgba(92, 54, 20, 0.25);
    }

    .detail-stat div {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      color: #4b2a0d;
      font-size: 13px;
      font-weight: 950;
      text-transform: uppercase;
    }

    .upgrade {
      min-height: 62px;
      padding: 0 30px;
      border: 3px solid #57300e;
      border-radius: 10px;
      background: linear-gradient(180deg, #ffe178, #e79922 56%, #b65c16);
      color: #351b08;
      font-size: 20px;
      font-weight: 950;
      text-transform: uppercase;
      box-shadow: inset 0 2px 0 rgba(255,255,255,0.6), 0 5px 0 rgba(73, 35, 8, 0.36);
    }

    @keyframes pulse {
      0%, 100% { transform: scale(0.84); opacity: 0.22; }
      50% { transform: scale(1.04); opacity: 0.46; }
    }

    @media (max-width: 1100px) {
      body { overflow: auto; }
      .screen {
        height: auto;
        min-height: calc(100vh - 24px);
        margin: 12px;
        width: auto;
      }
      .tree-panel { min-height: 620px; }
      .detail,
      .detail-main { grid-template-columns: 1fr; }
      .detail-icon { display: none; }
      .upgrade { width: 100%; }
    }
  </style>
</head>
<body>
  <main class="screen">
    <header class="topbar">
      <div class="title">
        <h1>Skill Tree</h1>
        <span>Parchment preview</span>
      </div>
      <div class="bp-chip">BP 26 / 500</div>
      <div class="close-chip">X</div>
    </header>

    <nav class="tabs" aria-label="Skill trees">
      <button class="tab attack active" type="button" data-tab-tree="attack">Attack Path</button>
      <button class="tab defense" type="button" data-tab-tree="defense">Defense Path</button>
      <button class="tab alchemist" type="button" data-tab-tree="alchemist">Alchemist Path</button>
    </nav>

    <section class="tree-grid" id="tree-grid"></section>

    <aside class="detail" id="detail"></aside>
  </main>

  <script>
    const sheets = {
      attack: {
        url: "Assets/UI/SkillIcons/attack-skill-icons-square.png",
        cols: 5,
        rows: 3,
        cell: 324,
      },
      defense: {
        url: "Assets/UI/SkillIcons/defense-skill-icons-square.png",
        cols: 5,
        rows: 4,
        cell: 324,
      },
      alchemist: {
        url: "Assets/UI/SkillIcons/alchemist-skill-icons-square.png",
        cols: 5,
        rows: 3,
        cell: 324,
      },
    };

    const trees = [
      {
        key: "attack",
        title: "Attack",
        nodes: [
          ["power_strike", "Power Strike", 0, 50, 12, null, 5, "purchased", "Adds base damage to every hit."],
          ["heavy_blow", "Heavy Blow", 1, 30, 28, "power_strike", 4, "purchased", "Heavy hits scale harder."],
          ["gaze", "Gaze", 2, 70, 28, "power_strike", 3, "available", "Adds critical chance and lowers attack stamina cost."],
          ["crusher", "Crusher", 3, 22, 48, "heavy_blow", 3, "purchased", "Ignores part of enemy defense."],
          ["berserker", "Berserker", 4, 42, 48, "heavy_blow", 2, "purchased", "More damage as HP gets lower."],
          ["bleed", "Bleed", 5, 62, 48, "gaze", 3, "available", "Adds bleeding pressure over time."],
          ["expose", "Expose", 6, 82, 48, "gaze", 1, "locked", "Crits can weaken enemy defense."],
          ["shatter", "Shatter", 7, 20, 69, "crusher", 1, "locked", "Stacks armor break over the fight."],
          ["execute", "Execute", 8, 35, 69, "crusher", 0, "locked", "Finishes enemies at low HP."],
          ["bloodrage", "Bloodrage", 9, 46, 69, "berserker", 2, "blocked", "Lifesteal on every hit."],
          ["death_wish", "Death Wish", 10, 56, 69, "berserker", 0, "locked", "Burst damage when near defeat."],
          ["hemorrhage", "Deep Wound", 11, 66, 69, "bleed", 3, "selected", "True damage chance rises against high DEF enemies."],
          ["rend", "Rend", 12, 76, 69, "bleed", 0, "locked", "Turns bleed into extra damage scaling."],
          ["rupture", "Rupture", 13, 84, 69, "expose", 0, "locked", "Crits hit harder against Exposed targets."],
          ["predator", "Predator", 14, 92, 69, "expose", 0, "locked", "Marks prey and punishes defensive play."],
        ],
      },
      {
        key: "defense",
        title: "Defense",
        nodes: [
          ["iron_hide", "Iron Hide", 0, 50, 12, null, 5, "purchased", "Reduces all incoming damage."],
          ["fortify", "Fortify", 1, 28, 28, "iron_hide", 4, "purchased", "Adds another layer of damage reduction."],
          ["shield_mastery", "Shield Mastery", 2, 50, 30, "iron_hide", 3, "available", "Improves shields and block efficiency."],
          ["vitality", "Vitality", 3, 72, 28, "iron_hide", 2, "purchased", "Increases max HP."],
          ["bulwark", "Bulwark", 4, 21, 48, "fortify", 2, "purchased", "More protection while healthy."],
          ["counter", "Counter", 5, 36, 48, "fortify", 1, "blocked", "Chance to punish blocked hits."],
          ["bash", "Bash", 17, 50, 48, "shield_mastery", 2, "available", "Block can return damage."],
          ["bastion", "Bastion", 17, 64, 48, "shield_mastery", 0, "locked", "Deepens block protection."],
          ["regeneration", "Regeneration", 6, 72, 48, "vitality", 2, "purchased", "Restores HP each turn."],
          ["lifesteal", "Lifesteal", 7, 86, 48, "vitality", 0, "locked", "Heals from damage dealt."],
          ["unbreakable", "Unbreakable", 8, 16, 69, "bulwark", 0, "locked", "More protection while wounded."],
          ["thorns", "Thorns", 9, 27, 69, "bulwark", 0, "locked", "Reflects incoming damage."],
          ["riposte", "Riposte", 10, 36, 69, "counter", 0, "locked", "Stores blocked damage for a burst."],
          ["counter_strike", "Counter Strike", 11, 45, 69, "counter", 0, "locked", "Next hit after counter deals more damage."],
          ["aegis", "Aegis", 12, 54, 69, "bash", 0, "locked", "First block can prevent heavy damage."],
          ["retaliation", "Retaliation", 13, 63, 69, "bash", 0, "locked", "Bash can stun."],
          ["phalanx", "Phalanx", 14, 72, 69, "bastion", 0, "locked", "Shield HP recovers over time."],
          ["guardian_stance", "Guardian Stance", 15, 84, 69, "bastion", 0, "locked", "Reduces critical damage while blocking."],
          ["sanguine_ward", "Sanguine Ward", 16, 92, 69, "lifesteal", 0, "locked", "Protective ward when HP drops low."],
        ],
      },
      {
        key: "alchemist",
        title: "Alchemist",
        nodes: [
          ["brew_master", "Brew Master", 0, 50, 12, null, 4, "purchased", "Unlocks better item control."],
          ["potency", "Potency", 1, 28, 29, "brew_master", 3, "purchased", "Consumables hit harder."],
          ["duration", "Duration", 2, 50, 30, "brew_master", 3, "available", "Timed buffs last longer."],
          ["amplify", "Amplify", 3, 72, 29, "brew_master", 1, "purchased", "Boosts potion effects."],
          ["quick_dose", "Quick Dose", 4, 22, 49, "potency", 2, "purchased", "Reduces item cooldown pressure."],
          ["extended", "Extended", 5, 34, 49, "potency", 0, "locked", "Adds more duration to key effects."],
          ["compound", "Compound", 6, 46, 49, "duration", 2, "available", "Stacks alchemical bonuses."],
          ["mixology", "Mixology", 7, 58, 49, "duration", 0, "locked", "Combines item effects more efficiently."],
          ["reservoir", "Reservoir", 8, 70, 49, "amplify", 0, "locked", "Adds extra carrying capacity."],
          ["rapid_reflex", "Rapid Reflex", 9, 82, 49, "amplify", 1, "blocked", "Emergency item tempo."],
          ["stim_pack", "Stim Pack", 10, 24, 70, "quick_dose", 0, "locked", "Damage boost after using items."],
          ["eternity", "Eternity", 11, 40, 70, "extended", 0, "locked", "Greatly extends buff windows."],
          ["catalyst", "Catalyst", 12, 54, 70, "compound", 0, "locked", "A timed buff expiring empowers the next hit."],
          ["stack_master", "Stack Master", 13, 68, 70, "mixology", 0, "locked", "More compound stacks."],
          ["synthesis", "Synthesis", 14, 84, 70, "reservoir", 0, "locked", "Turns many ingredients into a focused advantage."],
        ],
      },
    ];

    const treeGrid = document.getElementById("tree-grid");
    const detail = document.getElementById("detail");
    let activeTreeKey = "attack";
    let selected = trees[0].nodes.find(n => n[0] === "hemorrhage") || trees[0].nodes[0];
    let selectedTree = trees[0];

    function rankPips(rank) {
      return Array.from({ length: 5 }, (_, i) => `<span class="pip ${i < rank ? "on" : ""}"></span>`).join("");
    }

    function iconStyle(tree, index) {
      const sheet = sheets[tree.key];
      const col = index % 5;
      const row = Math.floor(index / 5);
      const posX = sheet.cols <= 1 ? 0 : (col / (sheet.cols - 1)) * 100;
      const posY = sheet.rows <= 1 ? 0 : (row / (sheet.rows - 1)) * 100;
      return `--cols:${sheet.cols};--rows:${sheet.rows};--pos-x:${posX}%;--pos-y:${posY}%;background-image:url('${sheet.url}')`;
    }

    function linkPath(from, to) {
      const x1 = from[3], y1 = from[4] + 8;
      const x2 = to[3], y2 = to[4] - 8;
      const mid = (y1 + y2) / 2;
      return `M ${x1} ${y1} C ${x1} ${mid}, ${x2} ${mid}, ${x2} ${y2}`;
    }

    function renderTree(tree) {
      const byId = new Map(tree.nodes.map(node => [node[0], node]));
      const activeIds = new Set(tree.nodes.filter(n => ["purchased", "available", "selected"].includes(n[7])).map(n => n[0]));
      const paths = tree.nodes
        .filter(node => node[5] && byId.has(node[5]))
        .map(node => {
          const parent = byId.get(node[5]);
          const active = activeIds.has(node[0]) && activeIds.has(parent[0]);
          return `<path class="${active ? "active" : ""}" d="${linkPath(parent, node)}"></path>`;
        }).join("");

      const nodes = tree.nodes.map(node => {
        const [id, name, iconIndex, x, y, parent, rank, state] = node;
        return `
          <button class="node ${state}" type="button" data-tree="${tree.key}" data-node="${id}" style="left:${x}%;top:${y}%">
            <span class="icon" style="${iconStyle(tree, iconIndex)}"></span>
            <span class="rank">${rankPips(rank)}</span>
            ${state === "locked" ? `<span class="lock">L</span>` : ""}
            ${state === "blocked" ? `<span class="block-x">X</span>` : ""}
            <span class="label">${name}</span>
          </button>
        `;
      }).join("");

      return `
        <article class="tree-panel ${tree.key}">
          <div class="tree-head">
            <div class="tree-name">${tree.title}</div>
            <div class="tree-count">${tree.nodes.length} nodes</div>
          </div>
          <div class="tree-canvas">
            <svg class="links" viewBox="0 0 100 100" preserveAspectRatio="none">${paths}</svg>
            ${nodes}
          </div>
        </article>
      `;
    }

    function renderDetail() {
      const [id, name, iconIndex, x, y, parent, rank, state, desc] = selected;
      const nextRank = Math.min(5, rank + 1);
      detail.innerHTML = `
        <div class="detail-main">
          <div class="detail-icon" style="${iconStyle(selectedTree, iconIndex)}"></div>
          <div>
            <h2>${name}</h2>
            <p>${desc}</p>
          </div>
          <div class="detail-stat">
            <div><span>Tree</span><strong>${selectedTree.title}</strong></div>
            <div><span>Rank</span><strong>${rank} / 5</strong></div>
            <div><span>Next</span><strong>${nextRank} / 5</strong></div>
            <div><span>Cost</span><strong>${state === "locked" ? "Locked" : "40 BP"}</strong></div>
          </div>
        </div>
        <button class="upgrade" type="button">${state === "locked" ? "Locked" : "Upgrade"}</button>
      `;
    }

    function render() {
      selectedTree = trees.find(tree => tree.key === activeTreeKey) || trees[0];
      if (!selectedTree.nodes.includes(selected)) {
        selected = selectedTree.nodes.find(node => ["selected", "available", "purchased"].includes(node[7])) || selectedTree.nodes[0];
      }

      treeGrid.innerHTML = renderTree(selectedTree);
      treeGrid.querySelectorAll(".node").forEach(button => {
        if (button.dataset.node === selected[0]) button.classList.add("selected");
        button.addEventListener("click", () => {
          selectedTree = trees.find(tree => tree.key === button.dataset.tree) || trees[0];
          selected = selectedTree.nodes.find(node => node[0] === button.dataset.node) || selectedTree.nodes[0];
          document.querySelectorAll(".node.selected").forEach(el => el.classList.remove("selected"));
          button.classList.add("selected");
          renderDetail();
        });
      });
      renderDetail();
    }

    document.querySelectorAll("[data-tab-tree]").forEach(tab => {
      tab.addEventListener("click", () => {
        activeTreeKey = tab.dataset.tabTree || "attack";
        document.querySelectorAll("[data-tab-tree]").forEach(el => el.classList.toggle("active", el === tab));
        const nextTree = trees.find(tree => tree.key === activeTreeKey) || trees[0];
        selectedTree = nextTree;
        selected = nextTree.nodes.find(node => ["selected", "available", "purchased"].includes(node[7])) || nextTree.nodes[0];
        render();
      });
    });

    render();
  </script>
</body>
</html>
