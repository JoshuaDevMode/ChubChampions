<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Chub Champions Tournament Bracket Preview</title>
  <style>
    :root {
      --ink: #3b2616;
      --muted: #76563a;
      --panel: #f7ead0;
      --panel-2: #ead5ad;
      --line: #a67d4c;
      --dark: #4b2d16;
      --gold: #f4a51c;
      --green: #2aa85a;
      --blue: #2f72b8;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      font-family: Arial, Helvetica, sans-serif;
      background:
        linear-gradient(180deg, rgba(95, 147, 185, 0.35), rgba(54, 99, 78, 0.22)),
        radial-gradient(circle at 20% 12%, rgba(255, 240, 180, 0.45), transparent 22%),
        linear-gradient(180deg, #bfe7ff 0%, #e8d4a9 48%, #866444 100%);
      overflow: hidden;
    }

    .page {
      height: 100vh;
      padding: 22px;
      display: grid;
      grid-template-rows: auto 1fr;
      gap: 14px;
    }

    .topbar {
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: center;
      gap: 18px;
      padding: 12px 16px;
      border: 3px solid #4b2d16;
      border-radius: 8px;
      background: linear-gradient(180deg, #fff4d4, #e4c18a);
      box-shadow: 0 5px 0 #2f1b0d, 0 12px 22px rgba(0,0,0,0.25), inset 0 1px 0 rgba(255,255,255,0.7);
    }

    h1 {
      margin: 0;
      font-size: 24px;
      line-height: 1;
      letter-spacing: 0;
      text-transform: uppercase;
    }

    .subtitle {
      margin-top: 4px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
      text-transform: uppercase;
    }

    .tabs {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .tab {
      min-width: 78px;
      height: 38px;
      border: 2px solid #5c3419;
      border-radius: 8px;
      color: #fff6dd;
      background: linear-gradient(180deg, #8a6037, #4d2d16);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.25), 0 3px 0 #2d170a;
      font-weight: 900;
      cursor: pointer;
    }

    .tab.active {
      color: #3a210f;
      background: linear-gradient(180deg, #ffd66a, #e89413);
    }

    .shell {
      min-height: 0;
      display: grid;
      grid-template-columns: 300px 1fr;
      gap: 14px;
    }

    .summary,
    .bracket-wrap {
      min-height: 0;
      border: 3px solid #4b2d16;
      border-radius: 8px;
      background: linear-gradient(180deg, rgba(255,248,229,0.96), rgba(226,207,171,0.96));
      box-shadow: 0 5px 0 #2f1b0d, 0 12px 22px rgba(0,0,0,0.24), inset 0 1px 0 rgba(255,255,255,0.65);
    }

    .summary {
      padding: 14px;
      overflow: auto;
    }

    .summary-title {
      font-size: 18px;
      font-weight: 900;
      text-transform: uppercase;
      margin-bottom: 12px;
    }

    .summary-grid {
      display: grid;
      gap: 9px;
    }

    .metric {
      min-height: 58px;
      padding: 10px 12px;
      border: 2px solid rgba(116, 79, 43, 0.55);
      border-radius: 8px;
      background: linear-gradient(180deg, #fff4d7, #e5ca96);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.6);
    }

    .metric span {
      display: block;
      color: var(--muted);
      font-size: 10px;
      font-weight: 900;
      text-transform: uppercase;
    }

    .metric strong {
      display: block;
      margin-top: 5px;
      font-size: 18px;
      line-height: 1.05;
    }

    .reward-list {
      margin-top: 14px;
      display: grid;
      gap: 8px;
    }

    .reward {
      display: grid;
      grid-template-columns: 82px 1fr;
      gap: 8px;
      align-items: center;
      padding: 8px;
      border-radius: 8px;
      border: 2px solid rgba(98, 64, 31, 0.45);
      background: rgba(255,255,255,0.32);
      font-size: 12px;
      font-weight: 900;
    }

    .reward span {
      color: var(--muted);
      font-size: 10px;
      text-transform: uppercase;
    }

    .bracket-wrap {
      overflow: hidden;
      display: grid;
      grid-template-rows: auto 1fr;
    }

    .bracket-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      padding: 12px 14px;
      border-bottom: 2px solid rgba(85, 52, 24, 0.42);
      background: rgba(255,248,228,0.55);
      font-size: 12px;
      font-weight: 900;
      text-transform: uppercase;
    }

    .bracket-scroll {
      min-height: 0;
      overflow: auto;
      padding: 18px;
      position: relative;
    }

    .bracket {
      --match-h: 58px;
      --round-gap: 42px;
      --match-gap: 14px;
      position: relative;
      display: grid;
      grid-template-columns: max-content 230px max-content;
      align-items: stretch;
      gap: 46px;
      width: max-content;
      min-height: 100%;
      padding: 8px 12px 14px;
    }

    .connector-svg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      overflow: visible;
      z-index: 0;
    }

    .connector-line {
      fill: none;
      stroke: rgba(117, 82, 43, 0.72);
      stroke-width: 3;
      stroke-linecap: round;
      stroke-linejoin: round;
      filter: drop-shadow(0 1px 0 rgba(255,255,255,0.55));
    }

    .bracket-side {
      position: relative;
      z-index: 1;
      display: flex;
      align-items: stretch;
      gap: var(--round-gap);
    }

    .bracket-side.right {
      flex-direction: row-reverse;
    }

    .round {
      width: 210px;
      display: flex;
      flex-direction: column;
      justify-content: space-around;
      gap: var(--match-gap);
      position: relative;
    }

    .bracket-side.right .round {
      direction: rtl;
    }

    .bracket-side.right .round * {
      direction: ltr;
    }

    .round-title {
      position: sticky;
      top: 0;
      z-index: 2;
      height: 28px;
      padding: 7px 10px;
      border: 2px solid #62401f;
      border-radius: 8px;
      color: #fff7df;
      background: linear-gradient(180deg, #73502e, #3d2412);
      box-shadow: 0 2px 0 #241207;
      font-size: 11px;
      font-weight: 900;
      text-align: center;
      text-transform: uppercase;
    }

    .matches {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: space-around;
      gap: var(--match-gap);
      min-height: calc(var(--match-h) * var(--match-count) + var(--match-gap) * (var(--match-count) - 1));
    }

    .match {
      height: var(--match-h);
      position: relative;
      border: 2px solid rgba(86, 53, 24, 0.72);
      border-radius: 8px;
      background: linear-gradient(180deg, #fff7dd, #dfc18a);
      box-shadow: 0 3px 0 rgba(72, 39, 16, 0.65), inset 0 1px 0 rgba(255,255,255,0.65);
      overflow: hidden;
    }

    .seed {
      height: 50%;
      display: grid;
      grid-template-columns: 28px 1fr auto;
      align-items: center;
      gap: 6px;
      padding: 0 8px;
      font-size: 11px;
      font-weight: 900;
      white-space: nowrap;
    }

    .seed + .seed {
      border-top: 1px solid rgba(102, 67, 32, 0.35);
    }

    .seed-num {
      color: var(--muted);
      font-size: 10px;
    }

    .seed-name {
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .seed-score {
      min-width: 22px;
      text-align: right;
      color: var(--blue);
    }

    .winner .seed-name,
    .winner .seed-score {
      color: var(--green);
    }

    .bye {
      opacity: 0.62;
    }

    .final-column {
      position: relative;
      z-index: 1;
      width: 230px;
      display: grid;
      align-content: center;
      gap: 14px;
      padding-top: 28px;
    }

    .final-title {
      height: 28px;
      padding: 7px 10px;
      border: 2px solid #62401f;
      border-radius: 8px;
      color: #fff7df;
      background: linear-gradient(180deg, #73502e, #3d2412);
      box-shadow: 0 2px 0 #241207;
      font-size: 11px;
      font-weight: 900;
      text-align: center;
      text-transform: uppercase;
    }

    .final-match {
      height: 74px;
    }

    .winner-banner {
      height: 108px;
      position: relative;
      overflow: hidden;
      display: grid;
      align-content: center;
      justify-items: center;
      gap: 6px;
      text-align: center;
      border: 3px solid #6f4215;
      border-radius: 8px;
      background:
        linear-gradient(90deg, transparent, rgba(255,255,255,0.46), transparent),
        radial-gradient(circle at 50% 8%, rgba(255,255,255,0.84), transparent 28%),
        linear-gradient(180deg, #fff1a3 0%, #f7b429 44%, #be6b10 100%);
      background-size: 180% 100%, 100% 100%, 100% 100%;
      box-shadow:
        0 4px 0 #3b1f0b,
        0 0 22px rgba(255, 185, 35, 0.62),
        inset 0 2px 0 rgba(255,255,255,0.78),
        inset 0 -4px 0 rgba(108,58,15,0.34);
      animation: winnerBannerGlow 2.8s ease-in-out infinite;
    }

    .winner-banner::before,
    .winner-banner::after {
      content: "";
      position: absolute;
      top: 50%;
      width: 22px;
      height: 58px;
      transform: translateY(-50%);
      background: linear-gradient(180deg, #d98b1f, #7e4210);
      border: 2px solid #5f3413;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.36);
    }

    .winner-banner::before {
      left: -9px;
      border-radius: 0 8px 8px 0;
    }

    .winner-banner::after {
      right: -9px;
      border-radius: 8px 0 0 8px;
    }

    .winner-label {
      position: relative;
      z-index: 1;
      color: #6f3c10;
      font-size: 10px;
      font-weight: 900;
      letter-spacing: 0;
      text-transform: uppercase;
      text-shadow: 0 1px 0 rgba(255,255,255,0.62);
    }

    .winner-name {
      position: relative;
      z-index: 1;
      max-width: 182px;
      overflow: hidden;
      text-overflow: ellipsis;
      color: #fff0a8;
      font-size: 25px;
      line-height: 1;
      font-weight: 900;
      letter-spacing: 0;
      text-transform: uppercase;
      text-shadow:
        0 2px 0 #6a3308,
        0 0 7px rgba(255,255,255,0.86),
        0 0 15px rgba(255,214,81,0.88);
      animation: winnerTextShine 1.55s ease-in-out infinite;
    }

    .winner-prize {
      position: relative;
      z-index: 1;
      min-width: 112px;
      padding: 4px 8px;
      border: 2px solid rgba(103,59,17,0.48);
      border-radius: 999px;
      background: rgba(255,246,207,0.42);
      color: #5c3514;
      font-size: 10px;
      font-weight: 900;
      text-transform: uppercase;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.56);
    }

    @keyframes winnerBannerGlow {
      0%, 100% {
        background-position: -120% 0, 0 0, 0 0;
        filter: saturate(1) brightness(1);
      }
      50% {
        background-position: 120% 0, 0 0, 0 0;
        filter: saturate(1.18) brightness(1.08);
      }
    }

    @keyframes winnerTextShine {
      0%, 100% {
        transform: scale(1);
        color: #ffef9a;
        text-shadow: 0 2px 0 #6a3308, 0 0 7px rgba(255,255,255,0.72), 0 0 14px rgba(255,210,72,0.72);
      }
      50% {
        transform: scale(1.035);
        color: #fff8cd;
        text-shadow: 0 2px 0 #6a3308, 0 0 10px rgba(255,255,255,0.95), 0 0 24px rgba(255,214,81,0.98);
      }
    }

    @media (max-width: 900px) {
      body { overflow: auto; }
      .page { height: auto; min-height: 100vh; padding: 12px; }
      .topbar { grid-template-columns: 1fr; }
      .tabs { flex-wrap: wrap; }
      .shell { grid-template-columns: 1fr; }
      .summary { max-height: none; }
      .bracket-wrap { height: 68vh; }
    }
  </style>
</head>
<body>
  <div class="page">
    <header class="topbar">
      <div>
        <h1>Tournament Bracket Preview</h1>
        <div class="subtitle">Visual mockup for 8, 16, 32 and 64 player tournaments</div>
      </div>
      <nav class="tabs" id="tabs"></nav>
    </header>

    <main class="shell">
      <aside class="summary" id="summary"></aside>
      <section class="bracket-wrap">
        <div class="bracket-head">
          <span id="bracket-title">Bracket</span>
          <span>Scroll horizontally for larger tournaments</span>
        </div>
        <div class="bracket-scroll">
          <div class="bracket" id="bracket"></div>
        </div>
      </section>
    </main>
  </div>

  <script>
    const SIZES = [8, 16, 32, 64];
    const NAMES = [
      'Mew', 'Bongo', 'Chubster', 'Bao', 'Mochi', 'Tanky', 'Pudge', 'Nori',
      'Goma', 'Panko', 'Boba', 'Tofu', 'Taro', 'Kuma', 'Luma', 'Nube',
      'Pickle', 'Dango', 'Miso', 'Waffle', 'Chunk', 'Poko', 'Biscuit', 'Yuki',
      'Peanut', 'Momo', 'Chonky', 'Pip', 'Tuna', 'Pudding', 'Kiko', 'Bun',
      'Maple', 'Dodo', 'Bean', 'Tobi', 'Mango', 'Soba', 'Fudge', 'Rolo',
      'Nana', 'Gordo', 'Zuzu', 'Tito', 'Mimi', 'Coco', 'Pepo', 'Lolo',
      'Milo', 'Koko', 'Bibi', 'Oreo', 'Poppy', 'Niko', 'Lichi', 'Poro',
      'Sunny', 'Ramen', 'Panda', 'Katsu', 'Maki', 'Dumpling', 'Bonbon', 'Puff'
    ];

    const REWARDS = {
      8:  { entry: 20, first: '60 coins', second: '25 coins', semi: '5 snacks' },
      16: { entry: 35, first: '100 coins', second: '45 coins', semi: '8 snacks' },
      32: { entry: 50, first: '1 crystal', second: '120 coins', semi: '15 snacks' },
      64: { entry: 50, first: 'exclusive skin', second: '1 crystal', semi: '100 coins' }
    };

    let currentSize = 8;

    function escapeHTML(value) {
      return String(value).replace(/[&<>"']/g, ch => ({
        '&': '&amp;',
        '<': '&lt;',
        '>': '&gt;',
        '"': '&quot;',
        "'": '&#39;'
      }[ch]));
    }

    function roundName(size, roundIndex, sideRounds) {
      if (roundIndex === sideRounds - 1) return 'Semifinal';
      if (roundIndex === sideRounds - 2) return 'Quarterfinal';
      const sideEntrants = size / 2;
      const roundEntrants = sideEntrants / Math.pow(2, roundIndex);
      return `Round of ${roundEntrants}`;
    }

    function makeEntrants(size) {
      return Array.from({ length: size }, (_, index) => ({
        seed: index + 1,
        name: NAMES[index] || `Fighter ${index + 1}`,
        score: ''
      }));
    }

    function makeSideRounds(competitors, side) {
      const rounds = [];
      let roundIndex = 0;
      while (competitors.length > 1) {
        const matches = [];
        const winners = [];
        for (let i = 0; i < competitors.length; i += 2) {
          const a = competitors[i];
          const b = competitors[i + 1] || { seed: '-', name: 'BYE', score: '', bye: true };
          const preferA = side === 'left' ? roundIndex % 2 === 0 : roundIndex % 2 !== 0;
          const winner = preferA || b.bye ? a : b;
          matches.push({
            a: { ...a, score: winner === a ? 2 : 1, winner: winner === a },
            b: { ...b, score: b.bye ? '' : winner === b ? 2 : 0, winner: winner === b }
          });
          winners.push({ seed: winner.seed, name: winner.name, score: '' });
        }
        rounds.push(matches);
        competitors = winners;
        roundIndex++;
      }
      return { rounds, winner: competitors[0] };
    }

    function renderTabs() {
      document.getElementById('tabs').innerHTML = SIZES.map(size => (
        `<button class="tab${size === currentSize ? ' active' : ''}" data-size="${size}">${size}</button>`
      )).join('');
      document.querySelectorAll('.tab').forEach(tab => {
        tab.addEventListener('click', () => {
          currentSize = Number(tab.dataset.size);
          render();
        });
      });
    }

    function renderSummary(size) {
      const reward = REWARDS[size];
      const rounds = Math.log2(size);
      document.getElementById('summary').innerHTML = `
        <div class="summary-title">${size} Player Tournament</div>
        <div class="summary-grid">
          <div class="metric"><span>Entry</span><strong>${reward.entry} coins</strong></div>
          <div class="metric"><span>Rounds</span><strong>${rounds}</strong></div>
          <div class="metric"><span>Matches</span><strong>${size - 1}</strong></div>
          <div class="metric"><span>Minimum Start</span><strong>${Math.max(4, Math.floor(size / 2))} players</strong></div>
        </div>
        <div class="reward-list">
          <div class="reward"><span>Champion</span><strong>${reward.first}</strong></div>
          <div class="reward"><span>Finalist</span><strong>${reward.second}</strong></div>
          <div class="reward"><span>Semifinalists</span><strong>${reward.semi}</strong></div>
        </div>
      `;
    }

    function renderSeed(seed) {
      const cls = ['seed', seed.winner ? 'winner' : '', seed.bye ? 'bye' : ''].filter(Boolean).join(' ');
      return `
        <div class="${cls}">
          <span class="seed-num">#${escapeHTML(seed.seed)}</span>
          <span class="seed-name">${escapeHTML(seed.name)}</span>
          <span class="seed-score">${escapeHTML(seed.score)}</span>
        </div>
      `;
    }

    function renderSide(side, rounds, size) {
      const sideRounds = rounds.length;
      return `
        <div class="bracket-side ${side}" data-side="${side}">
          ${rounds.map((matches, roundIndex) => `
            <div class="round" style="--match-count:${Math.max(1, matches.length)}">
              <div class="round-title">${roundName(size, roundIndex, sideRounds)}</div>
              <div class="matches">
                ${matches.map((match, matchIndex) => `
                  <div class="match" data-side="${side}" data-round="${roundIndex}" data-match="${matchIndex}">
                    ${renderSeed(match.a)}
                    ${renderSeed(match.b)}
                  </div>
                `).join('')}
              </div>
            </div>
          `).join('')}
        </div>
      `;
    }

    function renderFinal(leftWinner, rightWinner, size) {
      const prize = REWARDS[size]?.first || 'Champion Prize';
      return `
        <div class="final-column">
          <div class="final-title">Final</div>
          <div class="match final-match" data-final-match>
            ${renderSeed({ ...leftWinner, score: 2, winner: true })}
            ${renderSeed({ ...rightWinner, score: 1, winner: false })}
          </div>
          <div class="winner-banner">
            <div class="winner-label">Tournament Champion</div>
            <div class="winner-name">${escapeHTML(leftWinner.name)}</div>
            <div class="winner-prize">${escapeHTML(prize)}</div>
          </div>
        </div>
      `;
    }

    function localPoint(bracketRect, rect, side, targetSide) {
      const isLeftEdge = side === 'left-edge';
      const x = (isLeftEdge ? rect.left : rect.right) - bracketRect.left;
      const y = rect.top + rect.height / 2 - bracketRect.top;
      return { x, y, targetSide };
    }

    function connectorPath(from, to) {
      const dir = from.targetSide === 'right' ? 1 : -1;
      const gap = Math.max(18, Math.abs(to.x - from.x) * 0.5);
      const midX = from.x + dir * gap;
      return `M ${from.x} ${from.y} H ${midX} V ${to.y} H ${to.x}`;
    }

    function drawConnectors() {
      const bracket = document.getElementById('bracket');
      const svg = document.getElementById('connector-svg');
      if (!bracket || !svg) return;
      const bracketRect = bracket.getBoundingClientRect();
      svg.setAttribute('viewBox', `0 0 ${bracket.scrollWidth} ${bracket.scrollHeight}`);
      svg.setAttribute('width', bracket.scrollWidth);
      svg.setAttribute('height', bracket.scrollHeight);

      const paths = [];
      ['left', 'right'].forEach(side => {
        const rounds = Array.from(bracket.querySelectorAll(`.match[data-side="${side}"]`))
          .reduce((map, el) => {
            const round = Number(el.dataset.round);
            if (!map.has(round)) map.set(round, []);
            map.get(round)[Number(el.dataset.match)] = el;
            return map;
          }, new Map());
        const roundIndexes = Array.from(rounds.keys()).sort((a, b) => a - b);
        roundIndexes.forEach(round => {
          const current = rounds.get(round) || [];
          const next = rounds.get(round + 1) || [];
          current.forEach((matchEl, matchIndex) => {
            const target = next[Math.floor(matchIndex / 2)];
            if (!target) return;
            const fromRect = matchEl.getBoundingClientRect();
            const toRect = target.getBoundingClientRect();
            const from = side === 'left'
              ? localPoint(bracketRect, fromRect, 'right-edge', 'right')
              : localPoint(bracketRect, fromRect, 'left-edge', 'left');
            const to = side === 'left'
              ? localPoint(bracketRect, toRect, 'left-edge', 'right')
              : localPoint(bracketRect, toRect, 'right-edge', 'left');
            paths.push(connectorPath(from, to));
          });
        });

        const lastRound = roundIndexes[roundIndexes.length - 1];
        const sideWinner = rounds.get(lastRound)?.[0];
        const finalMatch = bracket.querySelector('[data-final-match]');
        if (sideWinner && finalMatch) {
          const fromRect = sideWinner.getBoundingClientRect();
          const toRect = finalMatch.getBoundingClientRect();
          const from = side === 'left'
            ? localPoint(bracketRect, fromRect, 'right-edge', 'right')
            : localPoint(bracketRect, fromRect, 'left-edge', 'left');
          const to = side === 'left'
            ? localPoint(bracketRect, toRect, 'left-edge', 'right')
            : localPoint(bracketRect, toRect, 'right-edge', 'left');
          paths.push(connectorPath(from, to));
        }
      });

      svg.innerHTML = paths.map(path => `<path class="connector-line" d="${path}"></path>`).join('');
    }

    function renderBracket(size) {
      document.getElementById('bracket-title').textContent = `${size} player bracket`;
      const entrants = makeEntrants(size);
      const left = makeSideRounds(entrants.slice(0, size / 2), 'left');
      const right = makeSideRounds(entrants.slice(size / 2), 'right');
      document.getElementById('bracket').innerHTML = `
        <svg class="connector-svg" id="connector-svg" aria-hidden="true"></svg>
        ${renderSide('left', left.rounds, size)}
        ${renderFinal(left.winner, right.winner, size)}
        ${renderSide('right', right.rounds, size)}
      `;
      requestAnimationFrame(drawConnectors);
    }

    function render() {
      renderTabs();
      renderSummary(currentSize);
      renderBracket(currentSize);
    }

    render();
    window.addEventListener('resize', () => requestAnimationFrame(drawConnectors));
  </script>
</body>
</html>
